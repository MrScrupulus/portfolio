<!DOCTYPE html>
<html lang="fr" data-theme="matrix">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>emile@portfolio:~$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=8" />
  <style>
    /* Force le curseur de saisie à être visible */
    #input { caret-color: #00ff41; }
    html[data-theme="amber"] #input { caret-color: #f59e0b; }
    html[data-theme="blue"] #input { caret-color: #38bdf8; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-terminal">
      <span class="loader-text">Loading...</span>
      <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
      <span class="loader-percent">0%</span>
    </div>
  </div>
  <div id="terminal">
    <div id="output">
      <div id="boot-output"></div>
      <div id="history"></div>
      <div class="line input-line">
        <span class="prompt" id="initial-prompt">emile-portfolio@localhost:~$ </span>
        <span class="input-wrapper">
          <input type="text" id="input" autocomplete="off" spellcheck="false" aria-label="Commande" />
        </span>
      </div>
    </div>
  </div>
  <script src="/js/terminal.js?v=7"></script>
</body>
</html>
